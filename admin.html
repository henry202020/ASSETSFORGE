<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin | AssetForge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="notification-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3"></div>

    <div id="deleteModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-white/10 p-8 rounded-3xl max-w-sm w-full text-center animate__animated animate__zoomIn">
            <div class="text-red-500 mb-4 flex justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            </div>
            <h3 class="text-xl font-bold mb-2">Excluir Asset?</h3>
            <p class="text-slate-400 mb-6 text-sm">Esta ação não pode ser desfeita. O arquivo será removido permanentemente.</p>
            <div class="flex gap-3">
                <button onclick="closeDeleteModal()" class="flex-1 py-3 rounded-xl bg-slate-800 font-bold hover:bg-slate-700 transition">Cancelar</button>
                <button id="confirmDeleteBtn" class="flex-1 py-3 rounded-xl bg-red-600 font-bold hover:bg-red-500 transition">Excluir</button>
            </div>
        </div>
    </div>

    <div id="loginOverlay" class="fixed inset-0 bg-[#0b0e14] flex items-center justify-center z-50">
        <div class="bg-slate-900 p-10 rounded-3xl border border-white/5 w-[400px] text-center shadow-2xl">
            <h2 class="text-3xl font-black mb-6 italic italic text-blue-500">ADMIN LOGIN</h2>
            <input type="password" id="pass" placeholder="DIGITE A SENHA" class="w-full bg-black/40 p-5 rounded-2xl mb-6 border border-white/5 outline-none focus:border-blue-500 text-center tracking-[10px]">
            <div class="flex flex-col gap-3">
                <button onclick="login()" class="w-full bg-blue-600 py-5 rounded-2xl font-black hover:bg-blue-500 transition shadow-lg shadow-blue-900/30">ENTRAR</button>
                <button onclick="location.href='index.html'" class="text-slate-500 hover:text-white text-sm">Voltar para a Galeria</button>
            </div>
        </div>
    </div>

    <div id="adminContent" class="hidden max-w-6xl mx-auto p-8">
        <div class="flex justify-between items-center mb-8 bg-slate-900/50 p-6 rounded-3xl border border-white/5">
            <h1 id="panelTitle" class="text-2xl font-black italic">EDITOR MODE</h1>
            <div class="flex gap-3">
                <button onclick="switchTab('create')" id="tabCreate" class="px-6 py-3 rounded-xl font-bold bg-blue-600 transition">Novo Asset</button>
                <button onclick="switchTab('manage')" id="tabManage" class="px-6 py-3 rounded-xl font-bold bg-slate-800 transition">Meus Assets</button>
            </div>
        </div>

        <div id="sectionForm" class="grid grid-cols-1 md:grid-cols-2 gap-8 animate__animated animate__fadeIn">
            <div class="bg-slate-900 p-8 rounded-3xl border border-white/5 space-y-4">
                <input type="hidden" id="editId">
                <label class="block font-bold text-blue-400 text-sm uppercase">Título</label>
                <input type="text" id="assetTitle" class="w-full bg-black/50 p-4 rounded-xl border border-white/5 outline-none focus:border-blue-500">
                
                <label class="block font-bold text-blue-400 text-sm uppercase">Descrição Detalhada</label>
                <textarea id="assetDesc" rows="4" class="w-full bg-black/50 p-4 rounded-xl border border-white/5 outline-none resize-none focus:border-blue-500"></textarea>

                <label class="block font-bold text-blue-400 text-sm uppercase">Link de Download</label>
                <input type="text" id="assetFileUrl" class="w-full bg-black/50 p-4 rounded-xl border border-white/5 outline-none focus:border-blue-500">
            </div>

            <div class="bg-slate-900 p-8 rounded-3xl border border-white/5 flex flex-col justify-between">
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block font-bold text-blue-400 text-sm uppercase">Status</label>
                            <select id="assetStatus" class="w-full bg-black/50 p-4 rounded-xl border border-white/5">
                                <option value="nenhum">Nenhum</option>
                                <option value="novo">Novo</option>
                                <option value="limitado">Limitado</option>
                                <option value="recomendado">Recomendado</option>
                            </select>
                        </div>
                        <div>
                            <label class="block font-bold text-red-500 text-sm uppercase">Falha Ativa</label>
                            <select id="assetFail" class="w-full bg-black/50 p-4 rounded-xl border border-white/5">
                                <option value="none">Nenhuma</option>
                                <option value="404">Erro 404</option>
                                <option value="virus">Vírus</option>
                                <option value="limit">Limite</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block font-bold text-blue-400 text-sm uppercase mb-2">Imagem de Capa</label>
                        <input type="file" id="assetImg" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-500 cursor-pointer">
                    </div>
                </div>
                <button onclick="saveAsset()" id="mainBtn" class="w-full bg-green-600 py-6 rounded-2xl font-black text-xl hover:bg-green-500 transition shadow-lg active:scale-95 mt-6">SALVAR ASSET</button>
            </div>
        </div>

        <div id="sectionManage" class="hidden animate__animated animate__fadeIn">
            <div id="existingAssetsList" class="grid gap-3"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
